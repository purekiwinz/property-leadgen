services:
  app:
    build:
      context: https://github.com/purekiwinz/property-leadgen.git
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_MAPBOX_API_KEY: ${NEXT_PUBLIC_MAPBOX_API_KEY}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID}
        NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID}
        NEXT_PUBLIC_LINKEDIN_CONVERSION_ID: ${NEXT_PUBLIC_LINKEDIN_CONVERSION_ID}
    restart: unless-stopped
    networks:
      - autoagent_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.property-leadgen.rule=Host(`leads.automate.pure-kiwi.com`)"
      - "traefik.http.routers.property-leadgen.entrypoints=websecure"
      - "traefik.http.routers.property-leadgen.tls.certresolver=letsencrypt"
      - "traefik.http.services.property-leadgen.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  autoagent_network:
    external: true
    name: autoagent_autoagent_network
