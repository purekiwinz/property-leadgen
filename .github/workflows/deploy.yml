name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/purekiwinz/property-leadgen

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_MAPBOX_API_KEY=${{ secrets.NEXT_PUBLIC_MAPBOX_API_KEY }}
            NEXT_PUBLIC_META_PIXEL_ID=${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
            NEXT_PUBLIC_LINKEDIN_PARTNER_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_PARTNER_ID }}
            NEXT_PUBLIC_LINKEDIN_CONVERSION_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CONVERSION_ID }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            HUBSPOT_ACCESS_TOKEN=${{ secrets.HUBSPOT_ACCESS_TOKEN }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: HUBSPOT_ACCESS_TOKEN,SUPABASE_SERVICE_ROLE_KEY
          script: |
            docker pull ghcr.io/purekiwinz/property-leadgen:latest
            cd /docker/autoagent
            grep -qxF "HUBSPOT_ACCESS_TOKEN=$HUBSPOT_ACCESS_TOKEN" .env 2>/dev/null || echo "HUBSPOT_ACCESS_TOKEN=$HUBSPOT_ACCESS_TOKEN" >> .env
            grep -qxF "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" .env 2>/dev/null || echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env
            docker-compose up -d leadgen
