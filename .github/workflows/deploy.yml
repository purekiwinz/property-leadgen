name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/purekiwinz/property-leadgen

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_MAPBOX_API_KEY=${{ secrets.NEXT_PUBLIC_MAPBOX_API_KEY }}
            NEXT_PUBLIC_META_PIXEL_ID=${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
            NEXT_PUBLIC_LINKEDIN_PARTNER_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_PARTNER_ID }}
            NEXT_PUBLIC_LINKEDIN_CONVERSION_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CONVERSION_ID }}

      - name: Make GHCR package public
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/property-leadgen/visibility" \
            -d '{"visibility":"public"}' || true

      - name: Redeploy autoagent stack on Hostinger
        env:
          HOSTINGER_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          # Fetch current autoagent compose
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $HOSTINGER_TOKEN" \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/1244831/docker/autoagent")

          # Re-POST it to trigger docker compose pull + up with the new image
          PAYLOAD=$(python3 -c "
          import json, sys
          data = json.loads(sys.stdin.read())
          print(json.dumps({'project_name': 'autoagent', 'content': data['content'], 'environment': data['environment']}))
          " <<< "$CURRENT")

          curl -sf -X POST \
            -H "Authorization: Bearer $HOSTINGER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/1244831/docker"
