name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/purekiwinz/property-leadgen

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_MAPBOX_API_KEY=${{ secrets.NEXT_PUBLIC_MAPBOX_API_KEY }}
            NEXT_PUBLIC_META_PIXEL_ID=${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
            NEXT_PUBLIC_LINKEDIN_PARTNER_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_PARTNER_ID }}
            NEXT_PUBLIC_LINKEDIN_CONVERSION_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CONVERSION_ID }}

      - name: Make GHCR package public
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/property-leadgen/visibility" \
            -d '{"visibility":"public"}' || true

      - name: Redeploy autoagent stack on Hostinger
        run: |
          python3 - << 'EOF'
          import json, urllib.request

          api = "https://developers.hostinger.com"
          vm_id = "1244831"
          token = "${{ secrets.HOSTINGER_API_TOKEN }}"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          # GET current autoagent compose from Hostinger
          req = urllib.request.Request(f"{api}/api/vps/v1/virtual-machines/{vm_id}/docker/autoagent", headers=headers)
          with urllib.request.urlopen(req) as r:
              current = json.loads(r.read())

          # POST it back to trigger docker compose pull + up
          payload = json.dumps({
              "project_name": "autoagent",
              "content": current["content"],
              "environment": current["environment"]
          }).encode()
          req = urllib.request.Request(f"{api}/api/vps/v1/virtual-machines/{vm_id}/docker", data=payload, headers=headers, method="POST")
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
          print(json.dumps(result, indent=2))
          EOF
